<section id="services" class="section section--dark services">
  <div class="container">
    <app-section-title
      [label]="langService.content().services.label"
      [title]="langService.content().services.title"
      [subtitle]="langService.content().services.subtitle"
    />

    <div class="services__grid" appStaggerReveal>
      @for (service of langService.content().services.items; track service.title) {
        <article class="services__card stagger-item card-lift">
          <span class="services__num">{{ service.num }}</span>
          <h3 class="services__title">{{ service.title }}</h3>
          <p class="services__desc">{{ service.description }}</p>
          <div class="services__tags">
            @for (tag of service.tags; track tag) {
              <span class="services__tag">{{ tag }}</span>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
