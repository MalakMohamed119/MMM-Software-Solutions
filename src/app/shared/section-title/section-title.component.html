<div class="section-title" [class.section-title--center]="centered()" appReveal variant="up">
  @if (label()) {
    <span class="section-title__label">{{ label() }}</span>
  }
  <h2 class="section-title__heading">{{ title() }}</h2>
  @if (subtitle()) {
    <p class="section-title__subtitle">{{ subtitle() }}</p>
  }
</div>
